name: "BCOS v2 — Beacon Certified Open Source"
description: |
  Verify repository trust score and certify open source quality on RustChain.
  Runs the BCOS v2 engine against any repo, posts PR comments with scores,
  and anchors attestations to RustChain on merge.
author: "Atlas (Bounty Hunter)"

inputs:
  tier:
    description: "Certification tier (L0, L1, or L2)"
    required: false
    default: "L1"
  reviewer:
    description: "Human reviewer name/handle (required for L2)"
    required: false
    default: ""
  node-url:
    description: "RustChain node URL for attestation anchoring"
    required: false
    default: "https://50.28.86.131"
  github-token:
    description: "GitHub token for posting PR comments"
    required: false
    default: "${{ github.token }}"
  repo-path:
    description: "Path to repository to scan"
    required: false
    default: "${{ github.workspace }}"

outputs:
  trust_score:
    description: "BCOS trust score (0-100)"
    value: ${{ steps.run.outputs.trust_score }}
  cert_id:
    description: "BCOS certificate ID (e.g. BCOS-a1b2c3d4)"
    value: ${{ steps.run.outputs.cert_id }}
  tier_met:
    description: "Whether the claimed tier threshold was met"
    value: ${{ steps.run.outputs.tier_met }}
  score_breakdown:
    description: "URL-encoded JSON score breakdown"
    value: ${{ steps.run.outputs.score_breakdown }}

runs:
  using: "composite"
  steps:
    - name: Set execute permission
      shell: bash
      run: chmod +x ${{ github.action_path }}/run_bcos.sh

    - name: Run BCOS Engine
      id: run
      shell: bash
      env:
        TIER: ${{ inputs.tier }}
        REVIEWER: ${{ inputs.reviewer }}
        NODE_URL: ${{ inputs.node-url }}
        GH_TOKEN: ${{ inputs.github-token }}
        REPO_PATH: ${{ inputs.repo-path }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
      run: ${{ github.action_path }}/run_bcos.sh
